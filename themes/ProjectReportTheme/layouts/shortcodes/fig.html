{{ $imageResource := $.Page.Resources.GetMatch (.Get "src")}}

<a name='{{ .Get "name" }}'></a>
<figure {{ with .Get "class" }}class="{{ . }}"{{ end }}>
    {{ with $imageResource }}
    {{ $image := .Resize "x700 Lanczos jpg" }}
    <img loading="lazy" src="{{ $image.RelPermalink }}"/>
    {{ else }}
    <img loading="lazy" src='{{ .Get "src" }}'>
    {{ end }}
    <figcaption>
        <p>{{ .Get "caption" }}</p>
    </figcaption>
</figure>
