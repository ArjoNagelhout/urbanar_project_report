<a name='{{ .Get "name" }}'></a>
<figure>
    <video {{ with .Get "gif" }}autoplay muted loop{{ else }}controls="true" allowfullscreen="true"{{ end }}>
        <source src='{{ .Get "src"}}' type="video/mp4">
      </video>
    <figcaption>
        <p>{{ .Get "caption" }}</p>
    </figcaption>
</figure>
